<!-- Developer config panel (tab sticks out at right edge) -->
<app-dev-panel />

<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="mx-auto h-14 w-14 rounded-2xl bg-indigo-600 flex items-center justify-center mb-5 shadow-md">
          <svg class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
        <p class="text-gray-500 mt-1.5 text-sm">Sign in to your Semine account</p>
      </div>

      <!-- Server Error -->
      @if (serverError()) {
        <div class="mb-5 p-3.5 bg-red-50 border border-red-200 rounded-xl flex items-start gap-2.5">
          <svg class="h-4 w-4 text-red-500 mt-0.5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
          </svg>
          <p class="text-red-700 text-sm">{{ serverError() }}</p>
        </div>
      }

      <!-- Form -->
      <form (submit)="$event.preventDefault(); submit()" novalidate class="space-y-5">

        <!-- Email Field -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            Email address
          </label>
          <input
            type="email"
            autocomplete="email"
            placeholder="alice@semine.com"
            [value]="email.value()"
            (input)="onInput(email, $event)"
            (blur)="onBlur(email)"
            [attr.disabled]="isLoading() ? true : null"
            class="form-input"
            [class.form-input-error]="email.error()"
          />
          @if (email.error()) {
            <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
              <svg class="h-3 w-3" viewBox="0 0 12 12" fill="currentColor">
                <path d="M10.9 8.6L7.2 1.2C6.8.4 5.2.4 4.8 1.2L1.1 8.6C.7 9.3 1.2 10 2 10h8c.8 0 1.3-.7.9-1.4zM6 8.5c-.4 0-.8-.3-.8-.8s.3-.8.8-.8.8.3.8.8-.4.8-.8.8zM5.3 5V3.5c0-.4.3-.7.7-.7s.7.3.7.7V5c0 .4-.3.7-.7.7s-.7-.3-.7-.7z"/>
              </svg>
              {{ email.error() }}
            </p>
          }
        </div>

        <!-- Password Field -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">
            Password
          </label>
          <div class="relative">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              autocomplete="current-password"
              placeholder="••••••••"
              [value]="password.value()"
              (input)="onInput(password, $event)"
              (blur)="onBlur(password)"
              [attr.disabled]="isLoading() ? true : null"
              class="form-input pr-10"
              [class.form-input-error]="password.error()"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            >
              @if (showPassword()) {
                <!-- Eye-off icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd" />
                  <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z" />
                </svg>
              } @else {
                <!-- Eye icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                  <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
                </svg>
              }
            </button>
          </div>
          @if (password.error()) {
            <p class="mt-1.5 text-xs text-red-600 flex items-center gap-1">
              <svg class="h-3 w-3" viewBox="0 0 12 12" fill="currentColor">
                <path d="M10.9 8.6L7.2 1.2C6.8.4 5.2.4 4.8 1.2L1.1 8.6C.7 9.3 1.2 10 2 10h8c.8 0 1.3-.7.9-1.4zM6 8.5c-.4 0-.8-.3-.8-.8s.3-.8.8-.8.8.3.8.8-.4.8-.8.8zM5.3 5V3.5c0-.4.3-.7.7-.7s.7.3.7.7V5c0 .4-.3.7-.7.7s-.7-.3-.7-.7z"/>
              </svg>
              {{ password.error() }}
            </p>
          }
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [attr.disabled]="isLoading() ? true : null"
          class="btn-primary w-full py-2.5 mt-2"
        >
          @if (isLoading()) {
            <app-spinner size="xs" color="border-white" />
            <span>Signing in...</span>
          } @else {
            <span>Sign in</span>
          }
        </button>

      </form>

      <!-- Demo Credentials Hint -->
      <div class="mt-6 p-4 bg-gray-50 rounded-xl border border-gray-200">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
          Demo credentials
        </p>
        <div class="space-y-1.5">

          <!-- Email row -->
          <div class="flex items-center gap-2 text-xs">
            <span class="text-gray-500 w-14 shrink-0">Email</span>
            <code class="flex-1 bg-white px-2 py-1 rounded border border-gray-200 text-gray-700 font-mono truncate">
              alice&#64;semine.com
            </code>
            <button
              type="button"
              (click)="copyToClipboard('alice@semine.com', 'email')"
              class="shrink-0 p-1 rounded-md text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors"
              title="Copy email"
            >
              @if (copiedField() === 'email') {
                <!-- Heroicon: check (copied state) -->
                <svg class="h-3.5 w-3.5 text-emerald-500" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              } @else {
                <!-- Heroicon: clipboard-document -->
                <svg class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M7 3.5A1.5 1.5 0 018.5 2h3A1.5 1.5 0 0113 3.5V4H7v-.5zM5.75 4H5a2 2 0 00-2 2v9.5A1.5 1.5 0 004.5 17h11a1.5 1.5 0 001.5-1.5V6a2 2 0 00-2-2h-.75V3.5A3 3 0 0011.5.5h-3A3 3 0 005.75 3.5V4z" />
                </svg>
              }
            </button>
          </div>

          <!-- Password row -->
          <div class="flex items-center gap-2 text-xs">
            <span class="text-gray-500 w-14 shrink-0">Password</span>
            <code class="flex-1 bg-white px-2 py-1 rounded border border-gray-200 text-gray-700 font-mono truncate">
              password123
            </code>
            <button
              type="button"
              (click)="copyToClipboard('password123', 'password')"
              class="shrink-0 p-1 rounded-md text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors"
              title="Copy password"
            >
              @if (copiedField() === 'password') {
                <svg class="h-3.5 w-3.5 text-emerald-500" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
                </svg>
              } @else {
                <svg class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M7 3.5A1.5 1.5 0 018.5 2h3A1.5 1.5 0 0113 3.5V4H7v-.5zM5.75 4H5a2 2 0 00-2 2v9.5A1.5 1.5 0 004.5 17h11a1.5 1.5 0 001.5-1.5V6a2 2 0 00-2-2h-.75V3.5A3 3 0 0011.5.5h-3A3 3 0 005.75 3.5V4z" />
                </svg>
              }
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
