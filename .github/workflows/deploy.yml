name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from Actions tab

# Required permissions for the modern Pages deployment API
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force

      # GitHub Pages serves the app at https://<owner>.github.io/<repo>/
      # so Angular must know the base path at build time.
      - name: Build
        run: |
          npm run build -- \
            --configuration production \
            --base-href "/${{ github.event.repository.name }}/"

      # GitHub Pages returns its own 404 page for unknown paths, which breaks
      # Angular client-side routing. Copying index.html as 404.html makes the
      # server hand control back to the Angular router for all deep links.
      - name: Copy index.html → 404.html (SPA routing fix)
        run: cp dist/semine-interview-app/browser/index.html dist/semine-interview-app/browser/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Angular 17+ application builder puts files in /browser sub-folder
          path: dist/semine-interview-app/browser

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
